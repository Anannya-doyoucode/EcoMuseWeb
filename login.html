<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoMuse — Login</title>

  <style>
    @font-face {
      font-family: "ErotiqueAlternate";
      src: url("./ErotiqueAlternateTrial-Medium.ttf") format("truetype");
    }

    :root {
      --beige: #f4f1ed;
      --brown-dark: #5e4631;
      --brown-light: #a38a75;
      --accent: #d9b59a;
      --text: #5a4a3b;
    }

    body {
      margin: 0;
      background: var(--beige);
      font-family: "Poppins", sans-serif;
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 22px 0;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      font-family: "ErotiqueAlternate", serif;
      font-size: 38px;
      color: var(--brown-dark);
      margin: 0;
    }

    main {
      max-width: 450px;
      margin: 60px auto;
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      color: var(--brown-dark);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      background: var(--brown-dark);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: var(--brown-light);
    }

    p {
      text-align: center;
      margin-top: 10px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header><h1>EcoMuse</h1></header>

  <main>
    <h2>Login to Continue</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login & Continue</button>
    </form>

    <p>Don’t have an account? <a href="register.html">Register</a></p>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", e => {
      e.preventDefault();

      const user = JSON.parse(localStorage.getItem("ecomuseUser"));
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!user) {
        alert("No account found. Please register first.");
        return;
      }

      if (email === user.email && password === user.password) {
        window.location.href = "checkout.html";
      } else {
        alert("Incorrect email or password.");
      }
    });
  </script>
</body>
</html>
